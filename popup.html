<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OAuth Permissions</title>
    <style>
      body {
        min-width: 220px;
        margin: 0;
        padding: 12px;
        color: #1f2328;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      label {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      input {
        width: 16px;
        height: 16px;
        margin: 0;
      }

      strong {
        display: block;
        font-size: 14px;
      }

      p {
        margin: 4px 0 0;
        color: #57606a;
      }
    </style>
  </head>
  <body>
    <label>
      <input id="enabled" type="checkbox">
      <span>
        <strong>Show permissions</strong>
        <p>Controls the inline GitHub app permissions lists.</p>
      </span>
    </label>
    <script src="popup.js"></script>
  </body>
</html>
